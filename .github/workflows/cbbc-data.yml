name: Rebuild CBBC street data

on:
  schedule:
    # 23:45 UTC Sun–Thu = 07:45 HKT Mon–Fri, after HKEX refreshes O/S (~06:15 HKT)
    - cron: "45 23 * * 0-4"
    # 10:40 UTC Mon–Fri = 18:40 HKT — capture the day's full MCE list
    - cron: "40 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Build CBBC JSON from HKEX full list
        run: python3 scripts/build_cbbc_data.py

      - name: Commit if changed
        run: |
          if git diff --quiet data/cbbc-latest.json data/cbbc-history.json; then
            echo "No new data (holiday or unchanged) — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cbbc-latest.json data/cbbc-history.json
          git commit -m "Refresh CBBC street data"
          git push
